{% extends "base.html" %}
{% block content %}
<div class="card p-5 col-md-10 mx-auto">
    <h2 class="text-center mb-4"><i class="bi bi-browser-chrome text-info"></i> Browser Fingerprint</h2>
    
    <div class="row">
        <div class="col-md-6">
            <h5 class="text-muted">Server-Side Visibility</h5>
            <ul class="list-group bg-dark">
                <li class="list-group-item bg-transparent text-white"><strong>IP Address:</strong> {{ ip }}</li>
                <li class="list-group-item bg-transparent text-white"><strong>User Agent:</strong> <small>{{ ua }}</small></li>
            </ul>
        </div>
        <div class="col-md-6">
            <h5 class="text-muted">Client-Side Exposure (JS)</h5>
            <ul class="list-group bg-dark" id="js-info">
                <li class="list-group-item bg-transparent text-white">Loading...</li>
            </ul>
        </div>
    </div>
</div>

<script>
    let info = document.getElementById('js-info');
    info.innerHTML = '';
    
    const data = {
        "Platform": navigator.platform,
        "Language": navigator.language,
        "Cookies Enabled": navigator.cookieEnabled ? "Yes" : "No",
        "Screen Resolution": `${window.screen.width}x${window.screen.height}`,
        "Color Depth": `${window.screen.colorDepth}-bit`,
        "Hardware Concurrency": navigator.hardwareConcurrency + " Cores",
        "Device Memory": navigator.deviceMemory ? navigator.deviceMemory + " GB" : "Unknown"
    };

    for (const [key, value] of Object.entries(data)) {
        let li = document.createElement('li');
        li.className = "list-group-item bg-transparent text-white";
        li.innerHTML = `<strong>${key}:</strong> ${value}`;
        info.appendChild(li);
    }
</script>
{% endblock %}
