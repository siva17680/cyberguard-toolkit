{% extends "base.html" %}
{% block content %}
<div class="card p-5 col-md-8 mx-auto">
    <h2 class="text-center mb-4"><i class="bi bi-hammer text-danger"></i> Hash Cracker</h2>
    <p class="text-muted text-center">Demonstration using a small internal dictionary.</p>
    
    <div class="mb-3">
        <label>Target Hash</label>
        <input type="text" id="hashInput" class="form-control" placeholder="e.g., 5f4dcc3b5aa765d61d8327deb882cf99">
    </div>
    
    <div class="mb-3">
        <label>Algorithm</label>
        <select id="algoInput" class="form-control">
            <option value="md5">MD5</option>
            <option value="sha256">SHA-256</option>
        </select>
    </div>

    <button onclick="crackHash()" class="btn btn-danger w-100">Attempt Crack</button>

    <div id="resultBox" class="mt-4 text-center d-none">
        <h3 id="resultText"></h3>
        <small id="timeText"></small>
    </div>
</div>

<script>
function crackHash() {
    let hash = document.getElementById('hashInput').value;
    let algo = document.getElementById('algoInput').value;

    fetch('{{ url_for("password_cracker.crack") }}', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({hash: hash, algo: algo})
    })
    .then(r => r.json())
    .then(data => {
        let box = document.getElementById('resultBox');
        let txt = document.getElementById('resultText');
        box.classList.remove('d-none');
        
        if(data.status === 'success') {
            txt.innerHTML = `<span class="text-success">CRACKED:</span> ${data.password}`;
        } else {
            txt.innerHTML = `<span class="text-danger">FAILED</span> (Not in dictionary)`;
        }
        document.getElementById('timeText').innerText = `Time taken: ${data.time}s`;
    });
}
</script>
{% endblock %}
