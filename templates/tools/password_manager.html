{% extends "base.html" %}

{% block content %}
<div class="container">
    <h2 class="mb-4 fw-bold"><i class="bi bi-safe2-fill text-info"></i> Password Vault</h2>

    <div class="card p-4 mb-4 border-0 shadow-sm">
        <h5 class="mb-3 text-white">Add New Credential</h5>
        <form id="addPassForm" class="row g-3">
            <div class="col-md-4">
                <input type="text" id="service" class="form-control" placeholder="Service (e.g. Netflix)" required>
            </div>
            <div class="col-md-4">
                <input type="text" id="username" class="form-control" placeholder="Username / Email" required>
            </div>
            <div class="col-md-3">
                <div class="input-group">
                    <input type="password" id="password" class="form-control" placeholder="Password" required>
                    <button class="btn btn-outline-secondary" type="button" onclick="toggleVisibility('password')">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
            <div class="col-md-1">
                <button type="submit" class="btn btn-success w-100"><i class="bi bi-plus-lg"></i></button>
            </div>
        </form>
    </div>

    <div class="card p-4 border-0 shadow-sm">
        <h5 class="mb-3 text-warning">Your Vault</h5>
        <div class="table-responsive">
            <table class="table table-dark table-hover align-middle">
                <thead>
                    <tr>
                        <th>Service</th>
                        <th>Username</th>
                        <th>Password</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody id="passwordTable">
                    {% if passwords %}
                        {% for pid, p in passwords.items() %}
                        <tr id="row-{{ pid }}">
                            <td class="fw-bold text-info">{{ p.service }}</td>
                            <td>{{ p.username }}</td>
                            <td>
                                <div class="input-group input-group-sm" style="max-width: 200px;">
                                    <input type="password" class="form-control bg-transparent border-0 text-white" value="{{ p.password }}" id="pass-{{ pid }}" readonly>
                                    <button class="btn btn-sm btn-link text-muted" onclick="toggleVisibility('pass-{{ pid }}')">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </td>
                            <td class="text-end">
                                <button class="btn btn-sm btn-outline-info me-1" onclick="copyPass('pass-{{ pid }}')" title="Copy">
                                    <i class="bi bi-clipboard"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-danger" onclick="deletePass('{{ pid }}')" title="Delete">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        </tr>
                        {% endfor %}
                    {% else %}
                        <tr><td colspan="4" class="text-center text-muted py-4">No passwords saved yet.</td></tr>
                    {% endif %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
// Toggle Password Visibility
function toggleVisibility(id) {
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}

// Copy to Clipboard
function copyPass(id) {
    const input = document.getElementById(id);
    // Temporarily show text to copy
    const originalType = input.type;
    input.type = "text";
    input.select();
    navigator.clipboard.writeText(input.value);
    input.type = originalType;
    alert("Password copied!");
}

// Add Password
document.getElementById('addPassForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const data = {
        service: document.getElementById('service').value,
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
    };

    fetch("{{ url_for('password_manager.add_password') }}", {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(res => {
        if(res.status === 'success') {
            location.reload();
        } else {
            alert(res.message);
        }
    });
});

// Delete Password
function deletePass(id) {
    if(!confirm("Delete this credential?")) return;

    fetch(`/tools/password-manager/delete/${id}`, { method: 'POST' })
    .then(r => r.json())
    .then(res => {
        if(res.status === 'success') {
            document.getElementById(`row-${id}`).remove();
        } else {
            alert(res.message);
        }
    });
}
</script>
{% endblock %}
