{% extends "base.html" %}
{% block content %}
<div class="card p-5 col-md-8 mx-auto">
    <h2 class="text-center mb-4"><i class="bi bi-shuffle text-info"></i> Secure Password Generator</h2>
    
    <div class="row mb-4">
        <div class="col-md-6">
            <h5 class="text-muted mb-3">Configuration</h5>
            
            <div class="mb-3">
                <label class="form-label">Length: <span id="lenVal" class="fw-bold text-info">16</span></label>
                <input type="range" class="form-range" id="length" min="8" max="64" value="16" oninput="document.getElementById('lenVal').innerText = this.value">
            </div>

            <div class="form-check form-switch mb-2">
                <input class="form-check-input" type="checkbox" id="upper" checked>
                <label class="form-check-label">Include Uppercase (A-Z)</label>
            </div>
            <div class="form-check form-switch mb-2">
                <input class="form-check-input" type="checkbox" id="lower" checked>
                <label class="form-check-label">Include Lowercase (a-z)</label>
            </div>
            <div class="form-check form-switch mb-2">
                <input class="form-check-input" type="checkbox" id="digits" checked>
                <label class="form-check-label">Include Numbers (0-9)</label>
            </div>
            <div class="form-check form-switch mb-2">
                <input class="form-check-input" type="checkbox" id="symbols" checked>
                <label class="form-check-label">Include Symbols (!@#$)</label>
            </div>
        </div>

        <div class="col-md-6 d-flex align-items-center justify-content-center flex-column">
            <button onclick="generatePass()" class="btn btn-custom btn-lg w-100 mb-3">
                <i class="bi bi-arrow-repeat"></i> Generate Password
            </button>
            
            <div class="input-group">
                <input type="text" id="result" class="form-control text-center font-monospace fs-5" readonly placeholder="Result here...">
                <button class="btn btn-outline-light" onclick="copyToClipboard('result')" data-bs-toggle="tooltip" title="Copy">
                    <i class="bi bi-clipboard"></i>
                </button>
            </div>
            <div id="copyMsg" class="text-success mt-2 small d-none">Copied to clipboard!</div>
        </div>
    </div>
</div>

<script>
function generatePass() {
    const data = {
        length: document.getElementById('length').value,
        upper: document.getElementById('upper').checked,
        lower: document.getElementById('lower').checked,
        digits: document.getElementById('digits').checked,
        symbols: document.getElementById('symbols').checked
    };

    fetch('{{ url_for("password_generator.generate") }}', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(data => {
        if(data.error) {
            alert(data.error);
        } else {
            document.getElementById('result').value = data.password;
        }
    });
}

// Add the copy function if not already in main.js
function copyToClipboard(id) {
    let copyText = document.getElementById(id);
    copyText.select();
    copyText.setSelectionRange(0, 99999);
    navigator.clipboard.writeText(copyText.value);
    
    let msg = document.getElementById('copyMsg');
    msg.classList.remove('d-none');
    setTimeout(() => msg.classList.add('d-none'), 2000);
}
</script>
{% endblock %}
