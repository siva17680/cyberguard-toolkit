{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h2 class="text-center mb-4"><i class="bi bi-shield-check text-success"></i> Password Strength Analyzer</h2>
            <p class="text-muted text-center">Passwords are processed in RAM and never stored.</p>
            
            <div class="mb-3 position-relative">
                <input type="password" id="passwordInput" class="form-control text-center fs-4" placeholder="Type a password...">
                <button class="btn position-absolute top-50 end-0 translate-middle-y me-3 text-white" onclick="togglePass()">
                    <i class="bi bi-eye"></i>
                </button>
            </div>

            <div class="strength-meter mb-3">
                <div id="strengthBar" class="strength-fill"></div>
            </div>
            <h4 id="strengthText" class="text-center fw-bold"></h4>
            
            <div id="results" class="mt-4 d-none">
                <div class="row text-center">
                    <div class="col-6 mb-2"><i id="icon-len" class="bi bi-x-circle text-danger"></i> Length > 8</div>
                    <div class="col-6 mb-2"><i id="icon-upper" class="bi bi-x-circle text-danger"></i> Uppercase</div>
                    <div class="col-6 mb-2"><i id="icon-num" class="bi bi-x-circle text-danger"></i> Numbers</div>
                    <div class="col-6 mb-2"><i id="icon-spec" class="bi bi-x-circle text-danger"></i> Special Char</div>
                </div>
                <div class="alert alert-info mt-3" id="crackTime"></div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('passwordInput').addEventListener('input', function() {
    let pwd = this.value;
    if(pwd.length === 0) {
        document.getElementById('results').classList.add('d-none');
        document.getElementById('strengthBar').style.width = '0%';
        document.getElementById('strengthText').innerText = '';
        return;
    }

    fetch('{{ url_for("password_checker.analyze") }}', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({password: pwd})
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById('results').classList.remove('d-none');
        
        // Update Bar
        let colors = ['#dc3545', '#dc3545', '#ffc107', '#28a745', '#20c997'];
        let width = (data.score + 1) * 20;
        let bar = document.getElementById('strengthBar');
        bar.style.width = width + '%';
        bar.style.backgroundColor = colors[data.score];
        
        document.getElementById('strengthText').innerText = data.strength;
        document.getElementById('strengthText').style.color = colors[data.score];
        document.getElementById('crackTime').innerText = `Estimated crack time (offline): ${data.crack_time}`;

        // Update Icons
        updateIcon('icon-len', data.details.length >= 8);
        updateIcon('icon-upper', data.details.has_upper);
        updateIcon('icon-num', data.details.has_digit);
        updateIcon('icon-spec', data.details.has_special);
    });
});

function updateIcon(id, isValid) {
    let el = document.getElementById(id);
    el.className = isValid ? "bi bi-check-circle-fill text-success" : "bi bi-x-circle-fill text-danger";
}

function togglePass() {
    let inp = document.getElementById('passwordInput');
    inp.type = inp.type === "password" ? "text" : "password";
}
</script>
{% endblock %}
